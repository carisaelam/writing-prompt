<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>writing prompt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --fg: #e0e0e0;
    --mid: #888;
    --dim: #333;
    --accent: #c0c0c0;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
  }

  .container {
    max-width: 640px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  h1 {
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--mid);
  }

  /* mode selector */
  .modes {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    justify-content: center;
  }

  .mode-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--dim);
    margin: -0.5px;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .mode-btn:hover {
    color: var(--mid);
    border-color: var(--mid);
    z-index: 1;
    position: relative;
  }

  .mode-btn.active {
    color: var(--fg);
    border-color: var(--mid);
    z-index: 2;
    position: relative;
  }

  /* SVG visual */
  .visual {
    width: 220px;
    height: 220px;
    transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .visual svg {
    width: 100%;
    height: 100%;
  }

  /* prompt text */
  .prompt-text {
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 1.9;
    text-align: center;
    color: var(--fg);
    min-height: 4em;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 1rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .prompt-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* button */
  .generate-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    color: var(--mid);
    border: 1px solid var(--dim);
    padding: 0.8rem 2.4rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .generate-btn:hover {
    color: var(--fg);
    border-color: var(--mid);
  }

  .generate-btn:active {
    transform: scale(0.97);
  }

  /* footer */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  @media (max-width: 500px) {
    .prompt-text { font-size: 1rem; }
    .visual { width: 160px; height: 160px; }
    .modes { gap: 0; }
    .mode-btn { font-size: 0.5rem; padding: 0.45rem 0.7rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>writing prompt</h1>

  <div class="modes" id="modes">
    <button class="mode-btn active" data-mode="freewrite">just write</button>
    <button class="mode-btn" data-mode="journal">journal</button>
    <button class="mode-btn" data-mode="poetry">poetry</button>
    <button class="mode-btn" data-mode="story">short story</button>
    <button class="mode-btn" data-mode="reflection">reflection</button>
  </div>

  <div class="visual" id="visual"></div>
  <div class="prompt-text" id="prompt"></div>
  <button class="generate-btn" id="btn">generate</button>
</div>

<div class="footer">press space or click</div>

<script>
// ── Prompts by mode ──
const prompts = {
  freewrite: [
    "the colour of 6am",
    "what your hands remember",
    "a door left open",
    "the weight of an empty room",
    "something you almost said",
    "the last thing you heard before falling asleep",
    "write about a sound you can't name",
    "an object you've kept too long",
    "the space between two breaths",
    "a word that feels like home",
    "what does silence look like?",
    "the shape of waiting",
    "write without stopping about water",
    "something small you noticed today",
    "a smell that takes you somewhere",
    "the first sentence of something unfinished",
    "describe the light right now",
    "a lie you told yourself",
    "what you'd say to the dark",
    "start with: I keep coming back to—",
    "a room you'll never enter again",
    "the texture of forgetting",
    "three things on your desk. go.",
    "a conversation you overheard",
    "what your shadow knows",
    "the gap between the plan and the day",
    "start with the weather. see where it goes.",
    "a question with no good answer",
    "what you were doing ten years ago today",
    "write the word 'anyway' and keep going",
  ],

  journal: [
    "what am I avoiding right now?",
    "what would today look like if I were brave?",
    "what's taking up the most space in my head?",
    "when did I last feel completely present?",
    "what am I grateful for that I usually ignore?",
    "what boundary do I keep letting slide?",
    "if I trusted myself fully, what would I do next?",
    "what's one thing I'd change about yesterday?",
    "who do I become when no one is watching?",
    "what conversation am I putting off?",
    "what would I tell my younger self about this week?",
    "what did I learn about myself recently?",
    "where in my body am I holding tension right now?",
    "what do I need that I'm not asking for?",
    "what's something I outgrew but haven't let go of?",
    "what does rest actually look like for me?",
    "what am I pretending is fine?",
    "what would enough look like today?",
    "what's a pattern I keep repeating?",
    "what would I do with a completely empty day?",
    "what am I building right now, even if slowly?",
    "what's the kindest thing someone did for me lately?",
    "where am I going? do I want to go there?",
    "what am I holding onto out of fear?",
    "what does my ideal morning feel like?",
  ],

  poetry: [
    "write a poem that fits in a matchbox",
    "bones",
    "the ocean at the wrong hour",
    "a love poem to something ordinary",
    "rust",
    "say the word 'tender' five different ways",
    "a poem made only of questions",
    "the last line is: and still, it grows.",
    "moths / light / what we're drawn to",
    "the opposite of a prayer",
    "a colour no one has named yet",
    "write from the perspective of rain",
    "an elegy for something small",
    "the first line is: I was not built for this.",
    "a poem using only one-syllable words",
    "hunger — but not for food",
    "threshold",
    "a letter to a season",
    "the geometry of grief",
    "something sharp, something soft, the space between",
    "honey and smoke",
    "the body as landscape",
    "write a poem backwards",
    "an apology to your own hands",
    "salt",
  ],

  story: [
    "it started with the wrong suitcase",
    "the town had one rule nobody talked about",
    "she found the note inside a library book",
    "the last customer of the night",
    "a gift that arrives 20 years late",
    "two strangers. a waiting room. one secret.",
    "the house remembers everything",
    "a promise kept in the worst way",
    "the year the birds stopped singing",
    "a character who can only tell the truth for one day",
    "the photograph was impossible",
    "begin at the ending",
    "a meal between enemies",
    "something is different about the neighbour's garden",
    "the letter was not meant for you",
    "a job interview for a position that doesn't exist",
    "the bridge nobody crosses after dark",
    "they agreed to meet one more time",
    "the map had one extra room",
    "write 500 words about a key",
    "someone returns to a place that no longer exists",
    "the thing she carried in her coat pocket",
    "a phone rings in an empty building",
    "the auction of unclaimed belongings",
    "the morning after something unnamed",
  ],

  reflection: [
    "what does it mean to belong somewhere?",
    "when did you first understand loss?",
    "what have you inherited that isn't yours?",
    "what does your relationship with time look like?",
    "what would you un-learn if you could?",
    "who are you when you're not performing?",
    "what's the most honest thing you know?",
    "how has your definition of success changed?",
    "what are you in the middle of becoming?",
    "what does your loneliness sound like?",
    "what do you owe to the person you used to be?",
    "what's a belief you've quietly abandoned?",
    "how do you know when something is over?",
    "what would you make if no one would ever see it?",
    "what's the difference between being alone and being lonely?",
    "what do you keep returning to in your mind?",
    "what does forgiveness actually require?",
    "what are you afraid to want?",
    "how do you hold contradictions within yourself?",
    "when do you feel most like yourself?",
    "what story do you tell about your life? is it true?",
    "what would you say to someone standing where you stood a year ago?",
    "what does courage look like in ordinary life?",
    "what are you protecting by staying quiet?",
    "what would it mean to stop keeping score?",
  ]
};

let currentMode = 'freewrite';
let lastIndex = -1;

function pick(arr) {
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === lastIndex && arr.length > 1);
  lastIndex = idx;
  return arr[idx];
}

function generatePrompt() {
  return pick(prompts[currentMode]);
}

// ── Generative SVG visual ──
function generateVisual() {
  const ns = 'http://www.w3.org/2000/svg';
  const size = 220;
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.setAttribute('fill', 'none');

  const type = Math.floor(Math.random() * 5);

  if (type === 0) {
    // concentric circles
    const count = 6 + Math.floor(Math.random() * 8);
    for (let i = count; i >= 1; i--) {
      const c = document.createElementNS(ns, 'circle');
      const r = (i / count) * 90;
      c.setAttribute('cx', size / 2);
      c.setAttribute('cy', size / 2);
      c.setAttribute('r', r);
      const opacity = 0.08 + (i / count) * 0.35;
      c.setAttribute('stroke', `rgba(200,200,200,${opacity})`);
      c.setAttribute('stroke-width', '0.5');
      const dashLen = Math.random() * 8 + 2;
      if (Math.random() > 0.4) c.setAttribute('stroke-dasharray', `${dashLen} ${dashLen * 1.5}`);
      svg.appendChild(c);
    }
  } else if (type === 1) {
    // radiating lines from center
    const count = 20 + Math.floor(Math.random() * 30);
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.1;
      const innerR = 10 + Math.random() * 30;
      const outerR = 50 + Math.random() * 55;
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', size/2 + Math.cos(angle) * innerR);
      line.setAttribute('y1', size/2 + Math.sin(angle) * innerR);
      line.setAttribute('x2', size/2 + Math.cos(angle) * outerR);
      line.setAttribute('y2', size/2 + Math.sin(angle) * outerR);
      const opacity = 0.1 + Math.random() * 0.3;
      line.setAttribute('stroke', `rgba(200,200,200,${opacity})`);
      line.setAttribute('stroke-width', Math.random() > 0.7 ? '1' : '0.5');
      svg.appendChild(line);
    }
  } else if (type === 2) {
    // grid of dots with displacement
    const cols = 12;
    const spacing = size / (cols + 1);
    for (let x = 1; x <= cols; x++) {
      for (let y = 1; y <= cols; y++) {
        const dx = (Math.random() - 0.5) * spacing * 0.6;
        const dy = (Math.random() - 0.5) * spacing * 0.6;
        const dist = Math.hypot(x - cols/2, y - cols/2);
        const maxDist = Math.hypot(cols/2, cols/2);
        const r = 0.5 + (1 - dist / maxDist) * 2;
        const opacity = 0.1 + (1 - dist / maxDist) * 0.5;
        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', x * spacing + dx);
        circle.setAttribute('cy', y * spacing + dy);
        circle.setAttribute('r', r);
        circle.setAttribute('fill', `rgba(200,200,200,${opacity})`);
        svg.appendChild(circle);
      }
    }
  } else if (type === 3) {
    // flowing curves
    const count = 5 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      const path = document.createElementNS(ns, 'path');
      const yBase = 30 + (i / count) * 160;
      const amp = 15 + Math.random() * 40;
      const freq = 0.01 + Math.random() * 0.03;
      const phase = Math.random() * Math.PI * 2;
      let d = `M 10 ${yBase}`;
      for (let x = 10; x <= 210; x += 4) {
        const y = yBase + Math.sin(x * freq + phase) * amp;
        d += ` L ${x} ${y}`;
      }
      path.setAttribute('d', d);
      const opacity = 0.1 + Math.random() * 0.25;
      path.setAttribute('stroke', `rgba(200,200,200,${opacity})`);
      path.setAttribute('stroke-width', '0.7');
      path.setAttribute('stroke-linecap', 'round');
      svg.appendChild(path);
    }
  } else {
    // nested rectangles / squares
    const count = 5 + Math.floor(Math.random() * 6);
    for (let i = count; i >= 1; i--) {
      const rect = document.createElementNS(ns, 'rect');
      const s = (i / count) * 170;
      const offset = (size - s) / 2;
      const rotation = (Math.random() - 0.5) * 15;
      rect.setAttribute('x', offset);
      rect.setAttribute('y', offset);
      rect.setAttribute('width', s);
      rect.setAttribute('height', s);
      rect.setAttribute('transform', `rotate(${rotation} ${size/2} ${size/2})`);
      const opacity = 0.08 + (i / count) * 0.3;
      rect.setAttribute('stroke', `rgba(200,200,200,${opacity})`);
      rect.setAttribute('stroke-width', '0.5');
      rect.setAttribute('fill', 'none');
      svg.appendChild(rect);
    }
  }

  return svg;
}

// ── Wire up ──
const promptEl = document.getElementById('prompt');
const visualEl = document.getElementById('visual');
const btn = document.getElementById('btn');
const modeButtons = document.querySelectorAll('.mode-btn');

function go() {
  promptEl.classList.remove('visible');

  setTimeout(() => {
    visualEl.innerHTML = '';
    visualEl.appendChild(generateVisual());
    promptEl.textContent = generatePrompt();
    promptEl.classList.add('visible');
  }, 300);
}

modeButtons.forEach(b => {
  b.addEventListener('click', () => {
    modeButtons.forEach(m => m.classList.remove('active'));
    b.classList.add('active');
    currentMode = b.dataset.mode;
    lastIndex = -1;
    go();
  });
});

btn.addEventListener('click', go);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); go(); }
});

go();
</script>
</body>
</html>
